<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Mobile Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Maharaja Solutions</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f1f5f9;
      font-family: Arial, sans-serif;
    }

    iframe {
      border: none;
      width: 100%;
      height: 100%;
      display: block;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #333;
      z-index: 9999;
    }

    .spinner {
      width: 35px;
      height: 35px;
      border: 4px solid #ddd;
      border-top: 4px solid #333;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <!-- Loading Screen -->
  <div id="loader">
    <div class="spinner"></div>
    Loading Maharaja Solutions...
  </div>

  <iframe id="appFrame"></iframe>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbz6jpL7l_SAl7hAhf1pfwvPQdDjEF9rUzQyi2cAMe-HSbciNqMSQCehlUeRVzlVR8gwZQ/exec";

    const frame = document.getElementById("appFrame");
    const loader = document.getElementById("loader");

    frame.src = APP_URL + "?embedded=true";

    frame.onload = function () {
      loader.style.display = "none";
    };

    // 🔥 Safety fallback (agar load event fail ho jaye)
    setTimeout(() => {
      loader.style.display = "none";
    }, 8000);
  </script>

</body>
</html>
